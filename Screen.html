<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Khắc Nhập Khắc Xuất - Screen</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body {
            margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center;
            overflow: hidden; background-image: url('bg1.png'); background-size: cover; background-position: center;
        }
        .game-board { display: flex; flex-direction: column; align-items: center; font-family: 'Arial', sans-serif; gap: 10px; }
        .main-prize {
            background-image: url('YellowStrap.png'); background-size: 100% 100%;
            width: 660px; height: 85px; display: flex; justify-content: center; align-items: center;
            color: #000; font-size: 42px; font-weight: bold;
        }
        .symbols-row { display: flex; width: 660px; gap: 4px; margin-bottom: 5px; }
        .symbol-box {
            background-image: url('SymbolStrap.png'); background-size: 100% 100%;
            flex: 1; height: 55px; display: flex; justify-content: center; align-items: center;
            font-size: 36px; font-weight: bold; color: #000;
        }
        .game-board.round-2-mode .symbol-box { display: flex; justify-content: center; align-items: center; line-height: 1; }
        .symbol-box.selected { background-image: url('SymbolChooseStrap.png') !important; }
        .symbol-box.closed { background-image: url('SymbolCloseStrap.png') !important; color: transparent !important; }
        
        .bottom-area { position: relative; width: 660px; height: 400px; }
        .money-grid {
            display: grid; grid-template-columns: repeat(2, 325px); grid-gap: 8px 10px;
            grid-auto-flow: column; grid-template-rows: repeat(6, 60px); width: 100%; height: 100%;
        }
        .money-box {
            background-image: url('YellowStrap.png'); background-size: 100% 100%; height: 60px;
            display: flex; justify-content: center; align-items: center; color: #000; font-size: 26px; font-weight: bold;
        }
        .money-box.selected { background-image: url('ChooseStrap.png') !important; }
        .money-box.closed { background-image: url('CloseStrap.png') !important; color: transparent !important; }
        .game-board.hide-money #moneyGrid { display: none !important; }

        /* PHẦN CHỦ ĐỀ & LỰA CHỌN A, B, C */
        .topic-container {
            display: none; background-image: url('YellowStrap.png'); background-size: 100% 100%;
            width: 660px; height: 65px; justify-content: center; align-items: center; position: absolute; top: 0; left: 0;
            transform: scaleX(0); transform-origin: center;
        }
        .topic-text { color: #000; font-size: 28px; font-weight: bold; opacity: 0; }
        .choices-column { display: none; flex-direction: column; gap: 12px; position: absolute; top: 77px; left: 0; z-index: 10; }
        .choice-box {
            background-image: url('sss.png'); background-size: 100% 100%; width: 75px; height: 75px;
            display: flex; justify-content: center; align-items: center; transform: scaleX(0); transform-origin: center;
        }
        .choice-box.used { background-image: url('bbb.png') !important; }
        .choice-text { color: #000; font-size: 44px; font-weight: bold; opacity: 0; }

        .game-board.show-topic .topic-container { display: flex; animation: stretchAcross 0.4s cubic-bezier(0.25, 1, 0.5, 1) forwards; }
        .game-board.show-topic .topic-text { animation: fadeInText 0.2s ease-in-out 0.3s forwards; }
        .game-board.show-choices .choices-column { display: flex; }
        .game-board.show-choices .choice-box { animation: stretchAcross 0.3s cubic-bezier(0.25, 1, 0.5, 1) forwards; }
        .game-board.show-choices .choice-text { animation: fadeInText 0.2s ease-in-out forwards; }

        /* KHUNG CÂU HỎI VÀ ĐÚNG/SAI */
        .question-area { display: none; position: absolute; top: 77px; left: 85px; width: 575px; height: 249px; }
        .question-box {
            width: 100%; height: 100%; background-size: 100% 100%; display: flex; align-items: center;
            padding: 20px 145px 20px 30px; box-sizing: border-box; transform: scaleX(0); transform-origin: left center;
        }
        .game-board.round-2-mode .question-box { padding: 20px 30px 20px 30px !important; }
        .question-content { color: #000; font-size: 22px; font-weight: bold; line-height: 1.4; opacity: 0; }
        .answer-buttons { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 15px; opacity: 0; }
        .game-board.round-2-mode .answer-buttons { display: none !important; }
        
        .ans-btn {
            background-image: url('sss.png'); background-size: 100% 100%; width: 100px; height: 80px;
            display: flex; justify-content: center; align-items: center; color: #000; font-size: 24px; font-weight: bold;
        }
        .ans-btn.chosen { background-image: url('true false choose strap.png') !important; color: #fff !important; }
        .ans-btn.correct-final { background-image: url('truefalseright strap.png') !important; color: #fff !important; }
        .ans-btn.wrong-final { background-image: url('truefalsewrongstrap.png') !important; color: #fff !important; }
        .ans-btn.hidden-ans { opacity: 0 !important; }
        .game-board.show-question .question-area { display: block; }
        .game-board.show-question .question-box { animation: stretchAcross 0.4s cubic-bezier(0.25, 1, 0.5, 1) forwards; }
        .game-board.show-question .question-content { animation: fadeInText 0.3s ease-in-out 0.4s forwards; }
        .game-board.show-question .answer-buttons { animation: fadeInText 0.3s ease-in-out 0.7s forwards; }

        /* KHUNG ĐÁP ÁN CHO VÒNG 2 */
        .round2-answer-container { display: none; position: absolute; top: 159px; width: 660px; height: 98px; }
        .round2-answer-box { width: 100%; height: 100%; background-size: 100% 100%; display: flex; justify-content: center; align-items: center; transform: scaleX(0); transform-origin: center; }
        .round2-answer-text { color: #000; font-size: 32px; font-weight: bold; text-align: center; opacity: 0; text-transform: uppercase; }
        
        .game-board.show-r2-ans .round2-answer-container, .game-board.show-r2-result .round2-answer-container { display: block; }
        .game-board.show-r2-ans .round2-answer-box, .game-board.show-r2-result .round2-answer-box { animation: stretchFromCenter 0.3s cubic-bezier(0.25, 1, 0.5, 1) forwards; }
        .game-board.show-r2-ans .round2-answer-text, .game-board.show-r2-result .round2-answer-text { animation: fadeInText 0.15s ease-in-out 0.3s forwards; }
        .game-board.show-r2-ans .choices-column, .game-board.show-r2-result .choices-column { display: none !important; }

        @keyframes stretchAcross { 0% { transform: scaleX(0); } 100% { transform: scaleX(1); } }
        @keyframes stretchFromCenter { 0% { transform: scaleX(0); } 100% { transform: scaleX(1); } }
        @keyframes fadeInText { 0% { opacity: 0; } 100% { opacity: 1; } }

        /* POPUP THÔNG BÁO */
        .game-popup-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.5);
            display: none; justify-content: center; align-items: center; z-index: 9999;
        }
        .game-popup-box {
            background: #fff; border: 3px solid #ff00ff; border-radius: 12px; padding: 25px 40px;
            text-align: center; font-family: 'Arial', sans-serif; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div class="game-board" id="gameBoard">
        <div class="main-prize" id="totalPrize">0 $A</div>
        <div class="symbols-row" id="symbolsRow"></div>

        <div class="bottom-area">
            <div class="money-grid" id="moneyGrid"></div>

            <div class="topic-container" id="topicContainer">
                <div class="topic-text" id="topicText">TỪ CHỦ ĐỀ 1</div>
            </div>

            <div class="choices-column" id="choicesColumn">
                <div class="choice-box" id="choiceA"><div class="choice-text">A</div></div>
                <div class="choice-box" id="choiceB"><div class="choice-text">B</div></div>
                <div class="choice-box" id="choiceC"><div class="choice-text">C</div></div>
            </div>

            <div class="question-area" id="questionArea">
                <div class="question-box" id="questionBox">
                    <div class="question-content" id="questionContent">Nội dung câu hỏi...</div>
                </div>
                <div class="answer-buttons" id="answerButtons">
                    <div class="ans-btn" id="trueBtn">ĐÚNG</div>
                    <div class="ans-btn" id="falseBtn">SAI</div>
                </div>
            </div>

            <div class="round2-answer-container" id="round2AnswerContainer">
                <div class="round2-answer-box" id="round2AnswerBox">
                    <div class="round2-answer-text" id="round2AnswerText">ĐÁP ÁN</div>
                </div>
            </div>
        </div>
    </div>

    <div class="game-popup-overlay" id="gamePopupOverlay">
        <div class="game-popup-box">
            <div class="game-popup-msg" id="gamePopupMsg" style="color:#000; font-size:18px; font-weight:bold;"></div>
        </div>
    </div>

    <script>
        const socket = io();
        let popupTimer = null;

        socket.on('sync-full-state', (state) => {
            const board = document.getElementById('gameBoard');
            
            // 1. Đồng bộ Round mode
            board.className = "game-board";
            if (state.currentActiveRound === 2) board.classList.add('round-2-mode');
            state.displayClasses.forEach(cls => board.classList.add(cls));

            // 2. Đồng bộ giải thưởng tổng
            document.getElementById('totalPrize').innerText = state.globalTotalPrize.toLocaleString('vi-VN') + " $A";

            // 3. Đồng bộ Bảng tiền
            const grid = document.getElementById('moneyGrid');
            grid.innerHTML = '';
            const layout = state.currentActiveRound === 1 ? state.currentMoneyLayoutV1 : state.currentMoneyLayoutV2;
            layout.forEach((val, idx) => {
                const box = document.createElement('div');
                box.className = 'money-box';
                box.innerText = val;
                if (state.moneyGridState[idx] === 'selected') box.classList.add('selected');
                if (state.moneyGridState[idx] === 'closed') box.classList.add('closed');
                grid.appendChild(box);
            });

            // 4. Đồng bộ Ký hiệu
            const sRow = document.getElementById('symbolsRow');
            sRow.innerHTML = '';
            const displaySigns = state.currentActiveRound === 1 ? ['+', '+', '+', '+', '-', '-', '-', '-'] : ['×', '×', '×', '×', '÷', '÷', '÷', '÷'];
            displaySigns.forEach((sign, idx) => {
                const box = document.createElement('div');
                box.className = 'symbol-box';
                box.innerHTML = `<span>${sign}</span>`;
                if (state.symbolBoxesState[idx] === 'selected') box.classList.add('selected');
                if (state.symbolBoxesState[idx] === 'closed') box.classList.add('closed');
                sRow.appendChild(box);
            });

            // 5. Đồng bộ Dữ liệu vòng & Câu hỏi đang chọn
            document.getElementById('topicText').innerText = state.currentRoundData.topic;
            ['A','B','C'].forEach(ch => {
                const cBox = document.getElementById(`choice${ch}`);
                if(state.usedChoices[ch]) cBox.classList.add('used');
                else cBox.classList.remove('used');
            });

            if (state.activeQuestion) {
                document.getElementById('questionContent').innerText = state.currentRoundData[state.activeQuestion].text;
                document.getElementById('questionBox').style.backgroundImage = `url('box${state.activeQuestion}.png')`;
                
                // Trạng thái nút bấm vòng 1
                document.getElementById('trueBtn').className = state.round1CtrlState.trueBtnClass;
                document.getElementById('falseBtn').className = state.round1CtrlState.falseBtnClass;
            }

            // 6. Trạng thái đáp án vòng 2
            const r2Box = document.getElementById('round2AnswerBox');
            const r2Txt = document.getElementById('round2AnswerText');
            r2Box.style.backgroundImage = state.round2CtrlState.backgroundImage;
            r2Txt.innerText = state.round2CtrlState.text;
            r2Txt.style.color = state.round2CtrlState.textColor;
        });

        socket.on('display-popup', (msg) => {
            if (popupTimer) clearTimeout(popupTimer);
            document.getElementById('gamePopupMsg').innerText = msg;
            document.getElementById('gamePopupOverlay').style.display = 'flex';
            popupTimer = setTimeout(() => {
                document.getElementById('gamePopupOverlay').style.display = 'none';
            }, 2500);
        });
    </script>
</body>
</html>
