<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Khắc Nhập Khắc Xuất - Screen</title>
    <script src="https://knkx.onrender.com/socket.io/socket.io.js"></script>
    <style>
        * {
            font-weight: bold !important;
            user-select: none;
            -webkit-user-select: none; 
            -moz-user-select: none;
            -ms-user-select: none;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-image: url('bg1.png');
            background-size: cover;
            background-position: center;
        }

        .game-board {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Arial', sans-serif;
            gap: 10px;
        }

        .main-prize {
            background-image: url('YellowStrap.png');
            background-size: 100% 100%;
            width: 660px;
            height: 85px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #000;
            font-size: 42px;
        }

        .symbols-row {
            display: flex;
            width: 660px;
            gap: 4px;
            margin-bottom: 5px;
        }

        .symbol-box {
            background-image: url('SymbolStrap.png');
            background-size: 100% 100%;
            flex: 1;
            height: 55px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 36px;
            color: #000;
        }

        .game-board.round-2-mode .symbol-box {
            display: flex;
            justify-content: center;
            align-items: center;
            line-height: 1;
        }

        .symbol-box.selected {
            background-image: url('SymbolChooseStrap.png') !important;
        }

        .symbol-box.closed {
            background-image: url('SymbolCloseStrap.png') !important;
            color: transparent !important;
        }

        .bottom-area {
            position: relative;
            width: 660px;
            height: 400px;
        }

        .money-grid {
            display: grid;
            grid-template-columns: repeat(2, 325px);
            grid-gap: 8px 10px;
            grid-auto-flow: column;
            grid-template-rows: repeat(6, 60px);
            width: 100%;
            height: 100%;
        }

        .money-box {
            background-image: url('YellowStrap.png');
            background-size: 100% 100%;
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #000;
            font-size: 26px;
        }

        .money-box.selected {
            background-image: url('ChooseStrap.png') !important;
        }

        .money-box.closed {
            background-image: url('CloseStrap.png') !important;
            color: transparent !important;
        }

        .game-board.hide-money #moneyGrid {
            display: none !important;
        }

        .topic-container {
            display: none;
            background-image: url('YellowStrap.png');
            background-size: 100% 100%;
            width: 660px;
            height: 65px;
            justify-content: center;
            align-items: center;
            position: absolute;
            top: 0;
            left: 0;
            transform: scaleX(0);
            transform-origin: center;
        }

        .topic-text {
            color: #000;
            font-size: 28px;
            opacity: 0;
        }

        .choices-column {
            display: none;
            flex-direction: column;
            gap: 12px;
            position: absolute;
            top: 77px;
            left: 0;
            z-index: 10;
        }

        .choice-box {
            background-image: url('sss.png');
            background-size: 100% 100%;
            width: 75px;
            height: 75px;
            display: flex;
            justify-content: center;
            align-items: center;
            transform: scaleX(0);
            transform-origin: center;
        }

        .choice-box.used {
            background-image: url('bbb.png') !important;
        }

        .choice-text {
            color: #000;
            font-size: 44px;
            opacity: 0;
        }

        .game-board.show-topic .topic-container {
            display: flex;
            animation: stretchAcross 0.4s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        .game-board.show-topic .topic-text {
            animation: fadeInText 0.2s ease-in-out 0.3s forwards;
        }

        .game-board.show-choices .choices-column {
            display: flex;
        }

        .game-board.show-choices .choice-box {
            animation: stretchAcross 0.3s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        .game-board.show-choices .choice-text {
            animation: fadeInText 0.2s ease-in-out forwards;
        }

        .question-area {
            display: none;
            position: absolute;
            top: 77px;
            left: 85px;
            width: 575px;
            height: 249px;
        }

        .question-box {
            width: 100%;
            height: 100%;
            background-size: 100% 100%;
            display: flex;
            align-items: center;
            padding: 20px 145px 20px 30px;
            box-sizing: border-box;
            transform: scaleX(0);
            transform-origin: left center;
        }

        .game-board.round-2-mode .question-box {
            padding: 20px 30px 20px 30px !important;
            transform-origin: left center;
        }

        .question-content {
            color: #000;
            font-size: 22px;
            line-height: 1.4;
            opacity: 0;
        }

        .answer-buttons {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 15px;
            opacity: 0;
        }

        .game-board.round-2-mode .answer-buttons {
            display: none !important;
        }

        .ans-btn {
            background-image: url('sss.png');
            background-size: 100% 100%;
            width: 100px;
            height: 80px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #000;
            font-size: 24px;
        }

        .ans-btn.chosen {
            background-image: url('true false choose strap.png') !important;
            color: #fff !important;
        }

        .ans-btn.correct-final {
            background-image: url('truefalseright strap.png') !important;
            color: #fff !important;
        }

        .ans-btn.wrong-final {
            background-image: url('truefalsewrongstrap.png') !important;
            color: #fff !important;
        }

        .ans-btn.hidden-ans {
            opacity: 0 !important;
        }

        .game-board.show-question .question-area {
            display: block;
        }

        .game-board.show-question .question-box {
            animation: stretchAcross 0.4s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            transform-origin: left center;
        }

        .game-board.show-question .question-content {
            animation: fadeInText 0.3s ease-in-out 0.4s forwards;
        }

        .game-board.show-question .answer-buttons {
            animation: fadeInText 0.3s ease-in-out 0.7s forwards;
        }

        .round2-answer-container {
            display: none;
            position: absolute;
            top: 159px;
            width: 660px;
            height: 98px;
        }

        .round2-answer-box {
            width: 100%;
            height: 100%;
            background-size: 100% 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            transform: scaleX(0);
            transform-origin: center;
        }

        .round2-answer-text {
            color: #000;
            font-size: 32px;
            text-align: center;
            opacity: 0;
            text-transform: uppercase;
        }

        @keyframes stretchAcross {
            0% {
                transform: scaleX(0);
            }

            100% {
                transform: scaleX(1);
            }
        }

        @keyframes fadeInText {
            0% {
                opacity: 0;
            }

            100% {
                opacity: 1;
            }
        }

        @keyframes shrinkLeft {
            0% {
                transform: scaleX(1);
                opacity: 1;
            }

            100% {
                transform: scaleX(0);
                opacity: 0;
            }
        }

        @keyframes stretchFromCenter {
            0% {
                transform: scaleX(0);
            }

            100% {
                transform: scaleX(1);
            }
        }

        @keyframes shrinkToCenter {
            0% {
                transform: scaleX(1);
            }

            100% {
                transform: scaleX(0);
            }
        }

        .game-board.round-2-mode.show-r2-ans .question-area {
            display: block;
        }

        .game-board.round-2-mode.show-r2-ans .question-box {
            animation: shrinkLeft 0.4s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        .game-board.round-2-mode.show-r2-ans .question-content {
            opacity: 0;
            transition: opacity 0.1s;
        }

        .game-board.round-2-mode.show-r2-ans .choices-column {
            display: none !important;
        }

        .game-board.round-2-mode.show-r2-ans .round2-answer-container {
            display: block;
        }

        .game-board.round-2-mode.show-r2-ans .round2-answer-box {
            animation: stretchFromCenter 0.4s cubic-bezier(0.25, 1, 0.5, 1) 0.3s forwards;
        }

        .game-board.round-2-mode.show-r2-ans .round2-answer-text {
            animation: fadeInText 0.15s ease-in-out 0.6s forwards;
        }

        .game-board.round-2-mode.play-close .question-area {
            display: none;
        }

        .game-board.round-2-mode.play-close .round2-answer-container {
            display: block;
        }

        .game-board.round-2-mode.play-close .round2-answer-box {
            animation: shrinkToCenter 0.3s cubic-bezier(0.25, 1, 0.5, 1) forwards !important;
            transform-origin: center !important;
        }

        .game-board.round-2-mode.play-close .round2-answer-text {
            opacity: 0 !important;
        }

        .game-board.round-2-mode.show-r2-result .question-area {
            display: none;
        }

        .game-board.round-2-mode.show-r2-result .choices-column {
            display: none !important;
        }

        .game-board.round-2-mode.show-r2-result .round2-answer-container {
            display: block;
        }

        .game-board.round-2-mode.show-r2-result .round2-answer-box {
            animation: stretchFromCenter 0.4s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            transform-origin: center !important;
        }

        .game-board.round-2-mode.show-r2-result .round2-answer-text {
            animation: fadeInText 0.15s ease-in-out 0.3s forwards;
        }

        @keyframes fadeInUpMoney {
            0% {
                opacity: 0;
                transform: translateY(20px) scale(0.95);
            }

            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .money-box-animate {
            opacity: 0;
            animation: fadeInUpMoney 0.1s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        /* Màn hình chờ chiếm Full Screen độc lập */
        .mhc-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: none;
            background-image: url('MHC.png');
            background-size: cover;
            background-position: center;
            z-index: 99999;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
    </style>
</head>

<body>
    <div id="mhcOverlay" class="mhc-overlay"></div>
    <div class="game-board hide-money" id="gameBoard">
        <div class="main-prize" id="totalPrize">0 $A</div>
        <div class="symbols-row" id="symbolsRow"></div>

        <div class="bottom-area">
            <div class="money-grid" id="moneyGrid"></div>

            <div class="topic-container" id="topicContainer">
                <div class="topic-text" id="topicText">TỪ CHỦ ĐỀ 1</div>
            </div>

            <div class="choices-column" id="choicesColumn">
                <div class="choice-box" id="choiceA">
                    <div class="choice-text">A</div>
                </div>
                <div class="choice-box" id="choiceB">
                    <div class="choice-text">B</div>
                </div>
                <div class="choice-box" id="choiceC">
                    <div class="choice-text">C</div>
                </div>
            </div>

            <div class="question-area" id="questionArea">
                <div class="question-box" id="questionBox">
                    <div class="question-content" id="questionContent">Nội dung câu hỏi...</div>
                </div>
                <div class="answer-buttons" id="answerButtons">
                    <div class="ans-btn" id="trueBtn">ĐÚNG</div>
                    <div class="ans-btn" id="falseBtn">SAI</div>
                </div>
            </div>

            <div class="round2-answer-container" id="round2AnswerContainer">
                <div class="round2-answer-box" id="round2AnswerBox">
                    <div class="round2-answer-text" id="round2AnswerText">ĐÁP ÁN</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('keydown', function (e) {
            if (e.key === 'F12') { e.preventDefault(); }
            if (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')) { e.preventDefault(); return false; }
            if (e.ctrlKey && e.key === 'U') { e.preventDefault(); }
        });
        document.addEventListener('contextmenu', function (e) { e.preventDefault(); });
    </script>
    <script>
        const socket = io('https://knkx.onrender.com');

        // Mảng lưu trữ các đối tượng audio đang được phát để có thể dừng khi có lệnh
        let activeAudios = [];

        // --- HỆ THỐNG CACHE & AUTO PRELOAD ÂM THANH NGẮN DƯỚI 10S ---
        const SHORT_SOUNDS = [
            'reveal_amount.mp3',
            'round_start.mp3',
            'theme_short.mp3',
            'ding.mp3'
        ];

        const audioCache = {};
        let currentBackgroundMusic = null; // Biến quản lý nhạc nền dài để dừng khi cần

        // Tiến hành tải trước vào bộ nhớ ngay khi mở màn hình Screen
        SHORT_SOUNDS.forEach(soundName => {
            const audio = new Audio(soundName);
            audio.preload = 'auto';
            // Đảm bảo load dữ liệu âm thanh ngầm
            audio.load();
            audioCache[soundName] = audio;
        });

        // Lắng nghe sự kiện phát âm thanh đồng bộ từ server gửi xuống
        socket.on('play-sound-client', (data) => {
            if (!data || !data.sound) return;

            const soundName = data.sound;

            // TRƯỜNG HỢP 1: Là âm thanh ngắn dưới 10 giây -> Phát ngay lập tức không delay
            if (audioCache[soundName]) {
                const audio = audioCache[soundName];
                audio.currentTime = 0; // Đưa về giây 0 (giúp bấm liên tục vẫn phát được ngay)
                audio.play().catch(err => console.log("Lỗi phát âm thanh ngắn:", err));
            }
            // TRƯỜNG HỢP 2: Là các bản nhạc nền dài (trên 10 giây) -> Tạo luồng chạy bình thường
            else {
                // Nếu bài cũ đang chạy thì dừng lại trước khi đổi bài dài mới
                if (currentBackgroundMusic) {
                    currentBackgroundMusic.pause();
                }
                currentBackgroundMusic = new Audio(soundName);
                currentBackgroundMusic.play().catch(err => console.log("Lỗi phát nhạc nền:", err));
            }
        });

        // Lắng nghe sự kiện dừng toàn bộ âm thanh
        socket.on('stop-all-sounds-client', () => {
            // 1. Dừng nhạc nền dài
            if (currentBackgroundMusic) {
                currentBackgroundMusic.pause();
                currentBackgroundMusic.currentTime = 0;
            }
            // 2. Dừng toàn bộ các âm thanh ngắn đang chạy dở
            SHORT_SOUNDS.forEach(soundName => {
                if (audioCache[soundName]) {
                    audioCache[soundName].pause();
                    audioCache[soundName].currentTime = 0;
                }
            });
        });

        let lastHideMoneyState = true;
        let activeDingIndexes = new Set();
        let currentRenderSession = 0;

        socket.on('sync-full-state', (state) => {

            // --- XỬ LÝ ẨN/HIỆN MÀN HÌNH CHỜ (MHC) ---
            const mhc = document.getElementById('mhcOverlay');
            if (mhc) {
                if (state.showMHC === undefined || state.showMHC === true) {
                    mhc.style.display = 'flex';
                } else {
                    mhc.style.display = 'none';
                }
            }

            // --- ĐỒNG BỘ CÁC THÀNH PHẦN KHÁC ---
            const board = document.getElementById('gameBoard');
            board.className = "game-board";
            if (state.currentActiveRound === 2) board.classList.add('round-2-mode');
            if (state.displayClasses && state.displayClasses.length > 0) {
                state.displayClasses.forEach(cls => board.classList.add(cls));
            }

            document.getElementById('totalPrize').innerText = state.globalTotalPrize.toLocaleString('vi-VN') + " $A";

            const isCurrentlyHidden = state.displayClasses && state.displayClasses.includes('hide-money');

            // Nếu bảng tiền bị ẩn đi, hoặc chuyển từ trạng thái ẨN sang HIỆN
            if (isCurrentlyHidden || (isCurrentlyHidden === false && lastHideMoneyState === true)) {
                activeDingIndexes.clear();
                currentRenderSession++; // Tăng phiên làm việc để hủy bỏ các sự kiện âm thanh cũ
            }
            lastHideMoneyState = isCurrentlyHidden;

            // PHÂN TÍCH HÀNH ĐỘNG ĐỂ QUYẾT ĐỊNH HIỆU ỨNG TRỰC QUAN VÀ ÂM THANH
            const isResetAction = (state.lastAction === 'reset');
            const isShowOrBackAction = (state.lastAction === 'show' || state.lastAction === 'back');
            // ĐIỀU CHỈNH CHÍNH: Chỉ cần bảng tiền KHÔNG ẩn và thuộc hành động show/back là chạy hiệu ứng 12 tiếng ding
            const shouldAnimate = (!isCurrentlyHidden && isShowOrBackAction);

            const grid = document.getElementById('moneyGrid');
            grid.innerHTML = '';
            const layout = state.currentActiveRound === 1 ? state.currentMoneyLayoutV1 : state.currentMoneyLayoutV2;
            const currentGridState = state.currentActiveRound === 1 ? state.moneyGridStateV1 : state.moneyGridStateV2;

            const thisSession = currentRenderSession;

            layout.forEach((val, idx) => {
                const box = document.createElement('div');
                box.className = 'money-box';
                box.innerText = val;
                if (currentGridState[idx] === 'selected') box.classList.add('selected');
                if (currentGridState[idx] === 'closed') box.classList.add('closed');

                if (shouldAnimate && !isResetAction) {
                    // HIỆN LẦN LƯỢT: Áp dụng CSS Animation Delay theo thứ tự ô
                    box.classList.add('money-box-animate');
                    box.style.animationDelay = `${idx * 0.1}s`;

                    // BẮT SỰ KIỆN PHÁT ÂM THANH DING CHO TỪNG Ô
                    box.addEventListener('animationstart', () => {
                        // Đảm bảo đúng phiên render hiện tại và ô này chưa từng được phát ding ở lượt mở bảng này
                        if (thisSession === currentRenderSession && !activeDingIndexes.has(idx)) {
                            activeDingIndexes.add(idx);
                            const snd = new Audio('ding.mp3');
                            snd.play().catch(err => console.log("Trình duyệt chặn phát âm thanh tự động:", err));
                        }
                    });

                } else {
                    // HIỆN ĐỒNG LOẠT: Khi bảng bị ẩn hoặc Reset, hiện ngay lập tức không delay hiệu ứng
                    box.style.opacity = '1';
                    box.style.transform = 'none';
                    box.style.animation = 'none';
                }
                grid.appendChild(box);
            });

            // --- ĐỒNG BỘ ĐỀ BÀI VÀ CÁC THÀNH PHẦN KHÁC KHÔNG ĐỔI ---
            const sRow = document.getElementById('symbolsRow');
            sRow.innerHTML = '';
            const displaySigns = state.currentActiveRound === 1 ? ['+', '+', '+', '+', '-', '-', '-', '-'] : ['×', '×', '×', '×', '÷', '÷', '÷', '÷'];
            const currentSymbolState = state.currentActiveRound === 1 ? state.symbolBoxesStateV1 : state.symbolBoxesStateV2;

            displaySigns.forEach((sign, idx) => {
                const box = document.createElement('div');
                box.className = 'symbol-box';
                box.innerHTML = `<span>${sign}</span>`;
                if (currentSymbolState[idx] === 'selected') box.classList.add('selected');
                if (currentSymbolState[idx] === 'closed') box.classList.add('closed');
                sRow.appendChild(box);
            });

            if (state.currentRoundData && state.currentRoundData.topic) {
                document.getElementById('topicText').innerText = state.currentRoundData.topic;
            } else {
                document.getElementById('topicText').innerText = '';
            }

            ['A', 'B', 'C'].forEach(ch => {
                const cBox = document.getElementById(`choice${ch}`);
                if (cBox) {
                    if (state.usedChoices && state.usedChoices[ch]) cBox.classList.add('used');
                    else cBox.classList.remove('used');
                }
            });

            if (state.activeQuestion && state.currentRoundData && state.currentRoundData[state.activeQuestion]) {
                document.getElementById('questionContent').innerText = state.currentRoundData[state.activeQuestion].text;
                document.getElementById('questionBox').style.backgroundImage = `url('box${state.activeQuestion}.png')`;
                if (state.round1CtrlState) {
                    document.getElementById('trueBtn').className = state.round1CtrlState.trueBtnClass || 'btn-answer';
                    document.getElementById('falseBtn').className = state.round1CtrlState.falseBtnClass || 'btn-answer';
                }
            } else {
                document.getElementById('questionContent').innerText = '';
            }

            const r2Box = document.getElementById('round2AnswerBox');
            const r2Txt = document.getElementById('round2AnswerText');
            if (r2Box && r2Txt && state.round2CtrlState) {
                r2Box.style.backgroundImage = state.round2CtrlState.backgroundImage || "url('bar2.png')";
                r2Txt.innerText = state.round2CtrlState.text || '';
                r2Txt.style.color = state.round2CtrlState.textColor || '#000000';
            }
        });
    </script>
</body>

</html>
